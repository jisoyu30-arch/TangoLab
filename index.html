    <title>석정소유의 탱고랩</title>

    <link rel="apple-touch-icon" href="/owl-icon.svg" />

    <!-- 에디토리얼 폰트 -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,900;1,400;1,700&family=Inter:wght@300;400;500;600;700&family=Nanum+Myeongjo:wght@400;700;800&family=Noto+Serif+KR:wght@300;400;500;600;700;900&display=swap" rel="stylesheet" />
  </head>
  <body class="bg-tango-ink text-tango-paper">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <!-- Service Worker 등록 — 자동 업데이트 감지 + 알림 -->
    <script>
      (function () {
        if (!('serviceWorker' in navigator)) return;

        function showUpdateToast(reload) {
          if (document.getElementById('tl-sw-toast')) return;
          var bar = document.createElement('div');
          bar.id = 'tl-sw-toast';
          bar.style.cssText = 'position:fixed;left:50%;bottom:20px;transform:translateX(-50%);z-index:99999;background:#1a1410;border:1px solid #C8A44E;border-radius:4px;padding:12px 18px;display:flex;gap:14px;align-items:center;font-family:-apple-system,sans-serif;font-size:13px;color:#E8DCC4;box-shadow:0 8px 32px rgba(0,0,0,0.5);max-width:90vw';
          bar.innerHTML =
            '<span>새 버전이 준비됐습니다</span>' +
            '<button id="tl-sw-reload" style="background:#C8A44E;color:#1a1410;border:0;border-radius:3px;padding:6px 14px;font-weight:600;cursor:pointer;font-size:12px">새로고침</button>' +
            '<button id="tl-sw-dismiss" style="background:transparent;color:#8a7a5e;border:0;cursor:pointer;font-size:18px;line-height:1">×</button>';
          document.body.appendChild(bar);
          document.getElementById('tl-sw-reload').onclick = reload;
          document.getElementById('tl-sw-dismiss').onclick = function () { bar.remove(); };
        }

        window.addEventListener('load', function () {
          navigator.serviceWorker.register('/sw.js').then(function (reg) {
            // 새 SW 가 대기 상태로 들어오면 토스트
            function onUpdate(sw) {
              sw.addEventListener('statechange', function () {
                if (sw.state === 'installed' && navigator.serviceWorker.controller) {
                  showUpdateToast(function () {
                    sw.postMessage({ type: 'SKIP_WAITING' });
                  });
                }
              });
            }

            if (reg.waiting) {
              showUpdateToast(function () {
                reg.waiting.postMessage({ type: 'SKIP_WAITING' });
              });
            }
            reg.addEventListener('updatefound', function () {
              if (reg.installing) onUpdate(reg.installing);
            });

            // 1시간마다 업데이트 체크
            setInterval(function () { reg.update().catch(function () {}); }, 60 * 60 * 1000);
          }).catch(function () {});

          // SKIP_WAITING 후 새 SW 가 controller 가 되면 자동 reload
          var refreshing = false;
          navigator.serviceWorker.addEventListener('controllerchange', function () {
            if (refreshing) return;
            refreshing = true;
            window.location.reload();
          });
        });
      })();
    </script>
  </body>
</html>
